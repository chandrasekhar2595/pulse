[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade",
  "python3.11 -m pip install --upgrade pip",
  "python3.11 -m pip install -r backend/requirements.txt"
]

[start]
cmd = "python3.11 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"